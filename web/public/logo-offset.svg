<svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Left Shape - Midnight Navy -->
  <path d="M 100 20
           C 50 20 20 50 20 100
           C 20 150 50 180 100 180
           C 115 180 125 175 130 170
           C 115 160 100 145 100 125
           C 100 110 110 105 120 100
           C 110 95 100 90 100 75
           C 100 55 115 40 130 30
           C 125 25 115 20 100 20 Z" 
        fill="#0B132B"/>
  
  <!-- Right Shape - Seal Gold (Offset to create gap and stagger) -->
  <!-- We simply translate the original right shape by dx=15, dy=15 -->
  <g transform="translate(15, 15)">
    <path d="M 100 20
             C 115 20 125 25 130 30
             C 115 40 100 55 100 75
             C 100 90 110 95 120 100
             C 110 105 100 110 100 125
             C 100 145 115 160 130 170
             C 125 175 115 180 100 180
             C 150 180 180 150 180 100
             C 180 50 150 20 100 20 Z" 
          fill="#C5A059"/>
  </g>
</svg>
